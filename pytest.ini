[pytest]
pythonpath = backend
testpaths = backend/tests
addopts = -ra --strict-markers --log-file=tests/artifacts/backend/pytest.log --log-file-level=INFO
markers =
    unit: small deterministic tests for pure functions and narrow services
    integration: tests that exercise FastAPI routes, database writes, or several components together
    live: tests that call real external services such as FYERS; skipped unless explicitly selected
    slow: tests expected to take noticeably longer than the fast suite
